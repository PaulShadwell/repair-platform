# Build and push API + Web images to GHCR.
# After this succeeds, update your cluster to the same tag (e.g. :latest or the short SHA).
name: Docker publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata (tags)
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Tags: latest, $SHORT_SHA, ${{ github.sha }}"

      # github.repository can include uppercase (e.g. owner name); Docker tags must be lowercase.
      - name: GHCR image paths (lowercase)
        id: registry
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_api=ghcr.io/${REPO_LOWER}/api" >> "$GITHUB_OUTPUT"
          echo "image_web=ghcr.io/${REPO_LOWER}/web" >> "$GITHUB_OUTPUT"
          echo "Built paths: ghcr.io/${REPO_LOWER}/api|web"

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.registry.outputs.image_api }}:latest
            ${{ steps.registry.outputs.image_api }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.registry.outputs.image_api }}:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ steps.registry.outputs.image_web }}:latest
            ${{ steps.registry.outputs.image_web }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.registry.outputs.image_web }}:${{ github.sha }}
