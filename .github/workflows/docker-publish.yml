# Build and push API + Web images to GHCR.
# After this succeeds, update your cluster to the same tag (e.g. :latest or the short SHA).
name: Docker publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_API: ghcr.io/${{ github.repository }}/api
      IMAGE_WEB: ghcr.io/${{ github.repository }}/web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata (tags)
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Tags: latest, $SHORT_SHA, ${{ github.sha }}"

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
