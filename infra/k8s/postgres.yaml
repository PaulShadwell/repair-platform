apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repair-platform-postgres-pvc
  namespace: repair-platform
spec:
  accessModes:
    - ReadWriteOnce
  # If PVC stays Pending: set storageClassName to your cluster default (kubectl get storageclass).
  # storageClassName: default
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repair-platform-postgres
  namespace: repair-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repair-platform-postgres
  template:
    metadata:
      labels:
        app: repair-platform-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: repair_platform
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: repair-platform-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: repair-platform-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: repair-platform-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: repair-platform-postgres
  namespace: repair-platform
spec:
  selector:
    app: repair-platform-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
