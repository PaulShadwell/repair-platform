apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: repair-platform-api-data-pvc
  namespace: repair-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repair-platform-api
  namespace: repair-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repair-platform-api
  template:
    metadata:
      labels:
        app: repair-platform-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/paulshadwell/repair-platform/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: repair-platform-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: repair-platform-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: 8h
            - name: CORS_ORIGIN
              value: https://repair-platform.techvee.cloud
            - name: PUBLIC_BASE_URL
              value: https://repair-platform.techvee.cloud
            - name: PHOTO_STORAGE_DIR
              value: /data/photos
            - name: PRINT_SPOOL_DIR
              value: /data/print-spool
            - name: DEFAULT_PRINTER_MODE
              value: spool
          volumeMounts:
            - name: api-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: api-data
          persistentVolumeClaim:
            claimName: repair-platform-api-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: repair-platform-api
  namespace: repair-platform
spec:
  selector:
    app: repair-platform-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
